AWSTemplateFormatVersion: "2010-09-09"
Description: Lambda-backed API for sethcharleston.com dynamic events, songs, and text.

Parameters:
  ProjectName:
    Type: String
    Default: sethcharleston
    AllowedPattern: "^[a-z0-9-]+$"
  Environment:
    Type: String
    Default: prod
    AllowedPattern: "^[a-z0-9-]+$"
  ApiDomainName:
    Type: String
    Default: api.sethcharleston.com
  ApiCertificateArn:
    Type: String
    Default: ""
    Description: Existing us-east-1 ACM certificate ARN for API and hosted auth custom domains. Leave blank to create a new DNS-validated certificate.
  HostedAuthDomainName:
    Type: String
    Default: ""
    Description: Optional Cognito hosted UI custom domain, for example login-staging.sethcharleston.com.
  EditorCallbackUrl:
    Type: String
    Default: https://edit.sethcharleston.com
    Description: Callback URL for the editor app after Cognito hosted UI login.
  EventsTableName:
    Type: String
    Default: seth_charleston_events
  MusicTableName:
    Type: String
    Default: seth_charleston_music
  TextTableName:
    Type: String
    Default: seth_charleston_text
  HostedZoneId:
    Type: String
    Default: ""
    Description: Route 53 hosted zone ID for the apex domain. Leave blank to use the execute-api URL.

Conditions:
  UseCustomDomain: !Not [!Equals [!Ref HostedZoneId, ""]]
  CreateCertificate: !And
    - !Condition UseCustomDomain
    - !Equals [!Ref ApiCertificateArn, ""]
  UseProvidedCertificate: !And
    - !Condition UseCustomDomain
    - !Not [!Equals [!Ref ApiCertificateArn, ""]]
  UseHostedAuthDomain: !And
    - !Condition UseCustomDomain
    - !Not [!Equals [!Ref HostedAuthDomainName, ""]]

Resources:
  EventsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Ref EventsTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: event
          AttributeType: S
      KeySchema:
        - AttributeName: event
          KeyType: HASH

  MusicTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Ref MusicTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: song
          AttributeType: S
      KeySchema:
        - AttributeName: song
          KeyType: HASH

  TextTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Ref TextTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: location
          AttributeType: S
      KeySchema:
        - AttributeName: location
          KeyType: HASH

  AdminUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${ProjectName}-${Environment}-admin"
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email

  AdminUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${ProjectName}-${Environment}-admin-client"
      UserPoolId: !Ref AdminUserPool
      GenerateSecret: false
      AllowedOAuthFlows:
        - code
        - implicit
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthScopes:
        - email
        - openid
      CallbackURLs:
        - !Ref EditorCallbackUrl
      ExplicitAuthFlows:
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_PASSWORD_AUTH
      SupportedIdentityProviders:
        - COGNITO

  AdminUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Condition: UseHostedAuthDomain
    Properties:
      Domain: !Ref HostedAuthDomainName
      UserPoolId: !Ref AdminUserPool
      CustomDomainConfig:
        CertificateArn: !If
          - UseProvidedCertificate
          - !Ref ApiCertificateArn
          - !Ref ApiCertificate

  AdminUserPoolDomainRecord:
    Type: AWS::Route53::RecordSet
    Condition: UseHostedAuthDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref HostedAuthDomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt AdminUserPoolDomain.CloudFrontDistribution
        HostedZoneId: Z2FDTNDATAQYW2

  ApiHandlerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDbAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DeleteItem
                  - dynamodb:PutItem
                  - dynamodb:Scan
                Resource:
                  - !GetAtt EventsTable.Arn
                  - !GetAtt MusicTable.Arn
                  - !GetAtt TextTable.Arn

  ApiHandler:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-${Environment}-api"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt ApiHandlerRole.Arn
      MemorySize: 128
      Timeout: 5
      Environment:
        Variables:
          EVENTS_TABLE: !Ref EventsTable
          MUSIC_TABLE: !Ref MusicTable
          TEXT_TABLE: !Ref TextTable
      Code:
        ZipFile: |
          import base64, hashlib, json, os
          import boto3
          db = boto3.resource("dynamodb")
          ev = db.Table(os.environ["EVENTS_TABLE"])
          mu = db.Table(os.environ["MUSIC_TABLE"])
          tx = db.Table(os.environ["TEXT_TABLE"])
          hdr = {"Access-Control-Allow-Origin":"*","Access-Control-Allow-Headers":"Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token","Access-Control-Allow-Methods":"GET,POST,OPTIONS"}
          def out(data, code=200):
              return {"statusCode": code, "headers": hdr, "body": json.dumps(data, default=str)}
          def body(e):
              raw = e.get("body") or "{}"
              if e.get("isBase64Encoded"): raw = base64.b64decode(raw).decode()
              return raw if isinstance(raw, dict) else json.loads(raw)
          def key(item, names):
              for n in names:
                  if item.get(n): return item[n]
              return None
          def handler(e, c):
              path = e.get("resource") or e.get("path", "/")
              if len(path) > 1 and path.endswith("/"): path = path[:-1]
              method = e.get("httpMethod", "GET")
              if method == "OPTIONS": return out({})
              try:
                  if method == "GET" and path == "/": return out({"Items": ev.scan().get("Items", [])})
                  if method == "GET" and path == "/songs": return out(mu.scan().get("Items", []))
                  if method == "GET" and path == "/text": return out(tx.scan().get("Items", []))
                  if method == "GET" and path == "/access": return out({"ok": True})
                  item = body(e)
                  if method == "POST" and path == "/":
                      item.setdefault("event", hashlib.sha256((item.get("name","")+item.get("when","")+item.get("where","")).encode()).hexdigest())
                      ev.put_item(Item=item); return out(item)
                  if method == "POST" and path == "/songs":
                      mu.put_item(Item=item); return out(item)
                  if method == "POST" and path == "/text":
                      tx.put_item(Item=item); return out(item)
                  if method == "POST" and path == "/delete":
                      k = key(item, ["event", "name"])
                      ev.delete_item(Key={"event": k}); return out({"deleted": k})
                  if method == "POST" and path == "/delete_song":
                      k = key(item, ["song"])
                      mu.delete_item(Key={"song": k}); return out({"deleted": k})
                  return out({"message": "not found"}, 404)
              except Exception as ex:
                  return out({"message": str(ex)}, 500)

  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "${ProjectName}-${Environment}-api"
      Description: !Sub "${ProjectName} ${Environment} Lambda API"
      EndpointConfiguration:
        Types:
          - EDGE

  ApiAuthorizer:
    Type: AWS::ApiGateway::Authorizer
    Properties:
      Name: login
      RestApiId: !Ref RestApi
      Type: COGNITO_USER_POOLS
      IdentitySource: method.request.header.Authorization
      ProviderARNs:
        - !GetAtt AdminUserPool.Arn

  SongsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: songs

  TextResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: text

  DeleteResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: delete

  DeleteSongResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: delete_song

  AccessResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: access

  RootGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !GetAtt RestApi.RootResourceId
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiHandler.Arn}/invocations"

  RootPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !GetAtt RestApi.RootResourceId
      HttpMethod: POST
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref ApiAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiHandler.Arn}/invocations"

  SongsGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref SongsResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiHandler.Arn}/invocations"

  SongsPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref SongsResource
      HttpMethod: POST
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref ApiAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiHandler.Arn}/invocations"

  TextGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref TextResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiHandler.Arn}/invocations"

  TextPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref TextResource
      HttpMethod: POST
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref ApiAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiHandler.Arn}/invocations"

  DeletePostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref DeleteResource
      HttpMethod: POST
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref ApiAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiHandler.Arn}/invocations"

  DeleteSongPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref DeleteSongResource
      HttpMethod: POST
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref ApiAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiHandler.Arn}/invocations"

  AccessGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref AccessResource
      HttpMethod: GET
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref ApiAuthorizer
      RequestParameters:
        method.request.header.Authorization: true
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiHandler.Arn}/invocations"

  RootOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !GetAtt RestApi.RootResourceId
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: "{\"statusCode\": 200}"
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Methods: "'GET,POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  SongsOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref SongsResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: "{\"statusCode\": 200}"
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Methods: "'GET,POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  TextOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref TextResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: "{\"statusCode\": 200}"
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Methods: "'GET,POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  DeleteOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref DeleteResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: "{\"statusCode\": 200}"
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  DeleteSongOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref DeleteSongResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: "{\"statusCode\": 200}"
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  AccessOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref AccessResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: "{\"statusCode\": 200}"
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Methods: "'GET,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ApiHandler
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*/*/*"

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - RootGetMethod
      - RootPostMethod
      - SongsGetMethod
      - SongsPostMethod
      - TextGetMethod
      - TextPostMethod
      - DeletePostMethod
      - DeleteSongPostMethod
      - AccessGetMethod
      - RootOptionsMethod
      - SongsOptionsMethod
      - TextOptionsMethod
      - DeleteOptionsMethod
      - DeleteSongOptionsMethod
      - AccessOptionsMethod
    Properties:
      RestApiId: !Ref RestApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref RestApi
      DeploymentId: !Ref ApiDeployment
      StageName: test1
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          ThrottlingBurstLimit: 5000
          ThrottlingRateLimit: 10000

  ApiCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: CreateCertificate
    Properties:
      DomainName: !Ref ApiDomainName
      SubjectAlternativeNames: !If
        - UseHostedAuthDomain
        - - !Ref HostedAuthDomainName
        - !Ref AWS::NoValue
      DomainValidationOptions:
        - DomainName: !Ref ApiDomainName
          HostedZoneId: !Ref HostedZoneId
        - !If
          - UseHostedAuthDomain
          - DomainName: !Ref HostedAuthDomainName
            HostedZoneId: !Ref HostedZoneId
          - !Ref AWS::NoValue
      ValidationMethod: DNS

  ApiCustomDomain:
    Type: AWS::ApiGateway::DomainName
    Condition: UseCustomDomain
    Properties:
      DomainName: !Ref ApiDomainName
      CertificateArn: !If
        - UseProvidedCertificate
        - !Ref ApiCertificateArn
        - !Ref ApiCertificate
      EndpointConfiguration:
        Types:
          - EDGE
      SecurityPolicy: TLS_1_2

  ApiBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Condition: UseCustomDomain
    Properties:
      DomainName: !Ref ApiCustomDomain
      RestApiId: !Ref RestApi

  ApiRecord:
    Type: AWS::Route53::RecordSet
    Condition: UseCustomDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref ApiDomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt ApiCustomDomain.DistributionDomainName
        HostedZoneId: !GetAtt ApiCustomDomain.DistributionHostedZoneId

  ApiIpv6Record:
    Type: AWS::Route53::RecordSet
    Condition: UseCustomDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref ApiDomainName
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt ApiCustomDomain.DistributionDomainName
        HostedZoneId: !GetAtt ApiCustomDomain.DistributionHostedZoneId

Outputs:
  ApiUrl:
    Value: !If
      - UseCustomDomain
      - !Sub "https://${ApiDomainName}/test1"
      - !Sub "https://${RestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/test1"
  UserPoolId:
    Value: !Ref AdminUserPool
  UserPoolClientId:
    Value: !Ref AdminUserPoolClient
  HostedAuthUrl:
    Value: !If
      - UseHostedAuthDomain
      - !Sub "https://${HostedAuthDomainName}/login?response_type=token&client_id=${AdminUserPoolClient}&redirect_uri=${EditorCallbackUrl}"
      - ""
  EventsTableName:
    Value: !Ref EventsTable
  MusicTableName:
    Value: !Ref MusicTable
  TextTableName:
    Value: !Ref TextTable

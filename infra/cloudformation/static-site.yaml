AWSTemplateFormatVersion: "2010-09-09"
Description: Existing static website hosting for sethcharleston.com using S3 website hosting, CloudFront, ACM, and Route 53.

Parameters:
  DomainName:
    Type: String
    Default: sethcharleston.com
  HostedZoneId:
    Type: String
    Default: Z27ZS6MVE7C6ZT
  AcmCertificateArn:
    Type: String
    Default: arn:aws:acm:us-east-1:305372771047:certificate/2db52ae6-5372-472a-b689-42126941926a
  PriceClass:
    Type: String
    Default: PriceClass_100
    AllowedValues:
      - PriceClass_100
      - PriceClass_200
      - PriceClass_All
  ManageDnsRecords:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
  IncludeWwwAlias:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"

Conditions:
  ManageDns: !Equals [!Ref ManageDnsRecords, "true"]
  IncludeWww: !Equals [!Ref IncludeWwwAlias, "true"]
  ManageWwwDns: !And
    - !Condition ManageDns
    - !Condition IncludeWww

Resources:
  SiteBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref DomainName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      LifecycleConfiguration:
        Rules:
          - Id: ExpireProductionBackups
            Status: Enabled
            Prefix: production-backups/
            ExpirationInDays: 30
      Tags:
        - Key: sethcharleston
          Value: S3
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html

  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    DependsOn:
      - SiteBucket
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: PublicReadForGetBucketObjects
            Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "${SiteBucket.Arn}/*"

  SiteDistribution:
    Type: AWS::CloudFront::Distribution
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      DistributionConfig:
        Enabled: true
        Aliases: !If
          - IncludeWww
          - - !Ref DomainName
            - !Sub "www.${DomainName}"
          - - !Ref DomainName
        DefaultRootObject: index.html
        HttpVersion: http2
        IPV6Enabled: true
        PriceClass: !Ref PriceClass
        Origins:
          - Id: !Sub "S3-${DomainName}"
            DomainName: !Sub "${DomainName}.s3-website-${AWS::Region}.${AWS::URLSuffix}"
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginKeepaliveTimeout: 5
              OriginProtocolPolicy: http-only
              OriginReadTimeout: 30
              OriginSSLProtocols:
                - TLSv1
                - TLSv1.1
                - TLSv1.2
        DefaultCacheBehavior:
          TargetOriginId: !Sub "S3-${DomainName}"
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - HEAD
            - DELETE
            - POST
            - GET
            - OPTIONS
            - PUT
            - PATCH
          CachedMethods:
            - HEAD
            - GET
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          MinTTL: 0
          DefaultTTL: 86400
          MaxTTL: 31536000
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
        ViewerCertificate:
          AcmCertificateArn: !Ref AcmCertificateArn
          MinimumProtocolVersion: TLSv1.1_2016
          SslSupportMethod: sni-only
        Restrictions:
          GeoRestriction:
            RestrictionType: none

  ApexRecord:
    Type: AWS::Route53::RecordSet
    Condition: ManageDns
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt SiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  WwwRecord:
    Type: AWS::Route53::RecordSet
    Condition: ManageWwwDns
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub "www.${DomainName}"
      Type: A
      AliasTarget:
        DNSName: !GetAtt SiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

Outputs:
  SiteBucketName:
    Description: S3 bucket that stores website files.
    Value: !Ref SiteBucket
  CloudFrontDistributionId:
    Description: CloudFront distribution ID for cache invalidations.
    Value: !Ref SiteDistribution
  CloudFrontDomainName:
    Description: Generated CloudFront hostname.
    Value: !GetAtt SiteDistribution.DomainName
  WebsiteUrl:
    Description: Public website URL.
    Value: !Sub "https://${DomainName}"
